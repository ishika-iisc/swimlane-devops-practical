apiVersion: v1
kind: ConfigMap
metadata:
  name: mongodb-init
  labels:
    app.kubernetes.io/name: swimlane-devops-practical
    app.kubernetes.io/component: mongodb
data:
  01-create-app-user.sh: |
    #!/usr/bin/env bash
    set -euo pipefail

    mongosh --quiet \
      --username "${MONGO_INITDB_ROOT_USERNAME}" \
      --password "${MONGO_INITDB_ROOT_PASSWORD}" \
      --authenticationDatabase admin \
      "${MONGO_APP_DATABASE}" <<EOF
    db = db.getSiblingDB("${MONGO_APP_DATABASE}");
    if (!db.getUser("${MONGO_APP_USERNAME}")) {
      db.createUser({
        user: "${MONGO_APP_USERNAME}",
        pwd: "${MONGO_APP_PASSWORD}",
        roles: [{ role: "readWrite", db: "${MONGO_APP_DATABASE}" }]
      });
    }
    EOF
