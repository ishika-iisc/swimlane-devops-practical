services:
  app:
    build:
      context: .
    image: swimlane-devops-practical:local
    environment:
      NODE_ENV: development
      PORT: "3000"
      MONGODB_URL: mongodb://swimlane:swimlane-pass@mongo:27017/swimlane?authSource=swimlane
    ports:
      - "${APP_PORT:-3000}:3000"
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  mongo:
    image: mongo:7.0
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root-pass
      MONGO_INITDB_DATABASE: swimlane
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
      - ./docker/mongo-init.js:/docker-entrypoint-initdb.d/01-create-app-user.js:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet --username root --password root-pass --authenticationDatabase admin --eval 'db.adminCommand({ ping: 1 }).ok' | grep 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

volumes:
  mongo-data:
